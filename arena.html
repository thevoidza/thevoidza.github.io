<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ARENA | Zihin Oyunları</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

    <style>
        :root {
            --bg-cream: #F4F1EA;
            --bar-burgundy: #4A0E17;
            --gold-accent: #C5A059;
            --text-dark: #2B2B2B;
        }

        body {
            background-color: var(--bg-cream);
            font-family: 'Cormorant Garamond', serif;
            color: var(--text-dark);
            margin: 0;
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .back-home {
            position: relative;
            margin: 20px 0 0 20px;
            color: var(--bar-burgundy);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
        }

        .arena-container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* TAHTA SABİTLEME: Mobilde ezilmeyi önler */
        #board-wrapper {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border: 8px solid var(--bar-burgundy);
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
        }

        #myBoard {
            width: 100%;
            aspect-ratio: 1 / 1; /* Kare formunu korur */
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }

        .architect-box {
            background: white;
            border: 1px solid rgba(74, 14, 23, 0.1);
            padding: 20px;
            border-radius: 4px;
            text-align: center;
        }

        .architect-box h3 {
            font-family: 'Cinzel', serif;
            font-size: 13px;
            color: var(--gold-accent);
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }

        #dialogue {
            font-style: italic;
            font-size: 17px;
            color: var(--bar-burgundy);
            margin: 0;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .timer-card {
            background: var(--bar-burgundy);
            color: white;
            padding: 12px;
            text-align: center;
            border-radius: 4px;
        }

        .timer-label { font-family: 'Fira Code', monospace; font-size: 8px; opacity: 0.8; }
        .timer-val { font-family: 'Cinzel', serif; font-size: 20px; }

        .status-bar {
            font-family: 'Cinzel', serif;
            font-size: 12px;
            color: var(--gold-accent);
            letter-spacing: 1px;
        }

        button {
            background: white;
            border: 1px solid var(--bar-burgundy);
            padding: 12px;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 10px;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        button:hover { background: var(--bar-burgundy); color: white; }
    </style>
</head>
<body>

    <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> GERİ DÖN</a>

    <div class="arena-container">
        <div id="board-wrapper">
            <div id="myBoard"></div>
        </div>

        <div class="info-panel">
            <div class="architect-box">
                <h3>ARCHITECT</h3>
                <p id="dialogue">Sıra sende Ali. Bakalım zihninde kaç hamle ötesini görebiliyorsun?</p>
            </div>

            <div class="timer-grid">
                <div class="timer-card">
                    <div class="timer-label">SİZ</div>
                    <div class="timer-val" id="user-time">10:00</div>
                </div>
                <div class="timer-card" style="background: var(--gold-accent);">
                    <div class="timer-label">ARCHITECT</div>
                    <div class="timer-val" id="ai-time">10:00</div>
                </div>
            </div>

            <div class="architect-box">
                <div class="status-bar" id="game-status">BEYAZIN SIRASI</div>
            </div>
            
            <button onclick="resetGame()">OYUNU SIFIRLA</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        
        // Stockfish Motoru (WASM - Tarayıcıda Çalışan Gerçek AI)
        var stockfish = new Worker('https://npmcdn.com/stockfish.js@0.10.2/stockfish.js');

        stockfish.onmessage = function(event) {
            if (event.data.indexOf('bestmove') > -1) {
                var move = event.data.split(' ')[1];
                game.move({ from: move.substring(0,2), to: move.substring(2,4), promotion: 'q' });
                board.position(game.fen());
                updateStatus();
            }
        };

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over() || piece.search(/^b/) !== -1) return false;
        }

        function onDrop (source, target) {
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            
            updateStatus();
            
            // Stockfish'e düşünme emri ver
            stockfish.postMessage('position fen ' + game.fen());
            stockfish.postMessage('go depth 12');
        }

        function onSnapEnd () { board.position(game.fen()); }

        function updateStatus () {
            var status = game.turn() === 'w' ? 'SIRA SİZDE' : 'ARCHITECT DÜŞÜNÜYOR...';
            if (game.in_checkmate()) status = 'MAT! OYUN BİTTİ.';
            if (game.in_draw()) status = 'BERABERE!';
            $('#game-status').text(status);

            const quotes = ["Derin bir analiz yapıyorum...", "Hamlen mantıklıydı.", "Hatanı bulmam uzun sürmez.", "Odaklan Ali."];
            if(game.turn() === 'b') $('#dialogue').text(quotes[Math.floor(Math.random() * quotes.length)]);
        }

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
        }

        board = Chessboard('myBoard', {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        });

        $(window).resize(board.resize);
    </script>
</body>
</html>
