<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Voidza | Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <header class="top-bar">
        <div class="logo">THE VOIDZA.</div>
        <div id="real-time-clock">00:00:00</div>
    </header>

    <div class="arena-layout">
        
        <aside class="panel" id="left-panel">
            <div class="profile-area">
                <h2 class="boss-name">THE ARCHITECT</h2>
                <div class="game-clock boss-clock" id="boss-timer">10:00</div>
            </div>
            
            <div class="chat-bubble" id="boss-text">
                Otur bakalım. Sürüklemek yok, hamleni dikkatlice seç...
            </div>
        </aside>

        <main class="panel" id="center-panel">
            <div id="myBoard"></div>
            
            <div class="player-area">
                <div class="player-name">ALİ EREN</div>
                <div class="game-clock player-clock" id="player-timer">10:00</div>
            </div>
        </main>

        <aside class="panel" id="right-panel">
            <h3 class="rabbit-title">TAVŞAN DELİĞİ</h3>
            <div class="rabbit-hole-window">
                <div id="rabbit-hole-container">
                    </div>
            </div>
        </aside>

    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
