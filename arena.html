<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Voidza | Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="arena-layout">
        
        <header>
            <div class="logo">THE VOIDZA<span class="dot">.</span></div>
            <div id="clock">Zaman akıyor...</div>
        </header>
        
        <aside class="panel" id="left-panel">
            <div class="boss-title">THE ARCHITECT</div>
            <div class="boss-bubble" id="boss-text">
                Karşımda oturmaya cesaret etmen güzel. Bakalım zekan da cesaretin kadar var mı?
            </div>
        </aside>
        
        <main id="center-panel">
            <div id="myBoard"></div>
        </main>
        
        <aside class="panel" id="right-panel">
            <h3 class="panel-title">TAVŞAN DELİĞİ</h3>
            <div id="rabbit-hole-container"></div>
        </aside>

    </div>
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
