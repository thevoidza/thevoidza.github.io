<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE ARENA | Zihin Oyunları</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

    <style>
        :root {
            --bg-cream: #F4F1EA;
            --bar-burgundy: #4A0E17;
            --gold-accent: #C5A059;
            --text-dark: #2B2B2B;
            --white-sq: #EBECD0;
            --black-sq: #779556; /* Huzurlu klasik yeşil tahta */
        }

        body {
            background-color: var(--bg-cream);
            font-family: 'Cormorant Garamond', serif;
            color: var(--text-dark);
            margin: 0;
            background-image: url('https://www.transparenttextures.com/patterns/natural-paper.png');
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .back-home {
            position: absolute;
            top: 20px; left: 20px;
            color: var(--bar-burgundy);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 12px;
            display: flex; align-items: center; gap: 8px;
            z-index: 100;
        }

        .arena-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        #board-wrapper {
            width: 100%;
            max-width: 550px;
            border: 10px solid var(--bar-burgundy);
            border-radius: 4px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .architect-box {
            background: white;
            border: 1px solid rgba(74, 14, 23, 0.1);
            padding: 25px;
            border-radius: 4px;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .architect-box h3 {
            font-family: 'Cinzel', serif;
            font-size: 14px;
            color: var(--gold-accent);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        #dialogue {
            font-style: italic;
            font-size: 18px;
            color: var(--bar-burgundy);
        }

        .timer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .timer-card {
            background: var(--bar-burgundy);
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 4px;
        }

        .timer-label { font-family: 'Fira Code', monospace; font-size: 9px; opacity: 0.8; }
        .timer-val { font-family: 'Cinzel', serif; font-size: 24px; font-weight: bold; }

        @media (max-width: 900px) {
            .arena-container { grid-template-columns: 1fr; margin-top: 40px; }
            #board-wrapper { max-width: 100%; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> GERİ DÖN</a>

    <div class="arena-container">
        <div id="board-wrapper">
            <div id="myBoard"></div>
        </div>

        <div class="info-panel">
            <div class="architect-box">
                <h3>ARCHITECT</h3>
                <p id="dialogue">Sıra sende Ali. İlk hamleni yap, zihnini analiz etmeye başlayayım.</p>
            </div>

            <div class="timer-grid">
                <div class="timer-card">
                    <div class="timer-label">SİZ</div>
                    <div class="timer-val" id="user-time">10:00</div>
                </div>
                <div class="timer-card" style="background: var(--gold-accent);">
                    <div class="timer-label">ARCHITECT</div>
                    <div class="timer-val" id="ai-time">10:00</div>
                </div>
            </div>

            <div class="architect-box" style="min-height: auto;">
                <h3 id="game-status">BEYAZIN SIRASI</h3>
            </div>
            
            <button onclick="resetGame()" style="background: none; border: 1px solid var(--bar-burgundy); padding: 10px; cursor: pointer; font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 2px;">OYUNU SIFIRLA</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <script>
        var board = null;
        var game = new Chess();
        var stockfish = new Worker('https://npmcdn.com/stockfish.js@0.10.2/stockfish.js');
        var engineStatus = {};

        // STOCKFISH AYARLARI
        stockfish.onmessage = function(event) {
            var line = event.data;
            if (line.indexOf('bestmove') > -1) {
                var move = line.split(' ')[1];
                makeBestMove(move);
            }
        };

        function makeBestMove(move) {
            var from = move.substring(0, 2);
            var to = move.substring(2, 4);
            game.move({ from: from, to: to, promotion: 'q' });
            board.position(game.fen());
            updateStatus();
        }

        function onDragStart (source, piece, position, orientation) {
            if (game.game_over()) return false;
            if (piece.search(/^b/) !== -1) return false;
        }

        function onDrop (source, target) {
            var move = game.move({
                from: source,
                to: target,
                promotion: 'q'
            });

            if (move === null) return 'snapback';

            updateStatus();
            
            // Stockfish'e hamle sırasını ver
            stockfish.postMessage('position fen ' + game.fen());
            stockfish.postMessage('go depth 10'); // Zorluk seviyesi (Zaman/Derinlik)
        }

        function onSnapEnd () {
            board.position(game.fen());
        }

        function updateStatus () {
            var status = 'Sıra: ' + (game.turn() === 'w' ? 'Beyaz' : 'Siyah');
            if (game.in_checkmate()) status = 'MAT! Oyun bitti.';
            if (game.in_draw()) status = 'BERABERE!';
            
            $('#game-status').text(status.toUpperCase());
            
            const quotes = ["Güzel hamle Ali.", "Zayıf bir nokta buldum...", "Zamanın azalıyor.", "Analiz tamamlandı."];
            if(game.turn() === 'b') $('#dialogue').text(quotes[Math.floor(Math.random() * quotes.length)]);
        }

        function resetGame() {
            game.reset();
            board.start();
            updateStatus();
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: onSnapEnd,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        board = Chessboard('myBoard', config);
        $(window).resize(board.resize);
    </script>
</body>
</html>
